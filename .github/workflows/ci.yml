name: SafeOps CI

on:
  push:
    branches:
      - main
      - 'milestone-*'
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    name: Repository smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run SafeOps CI smoke test
        run: bash scripts/ci_smoke_test.sh
