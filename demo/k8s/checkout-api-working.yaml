apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: demo
  labels:
    app: checkout-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout-api
  template:
    metadata:
      labels:
        app: checkout-api
    spec:
      containers:
        - name: checkout-api
          image: safeops/checkout-api-demo:0.1.0
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_URL
              value: "redis://redis.demo.svc.cluster.local:6379"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-api
  namespace: demo
spec:
  selector:
    app: checkout-api
  ports:
    - port: 80
      targetPort: 8080
